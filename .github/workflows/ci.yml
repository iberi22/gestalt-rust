name: CI

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gestalt-rust"
          cache-on-failure: true

      - name: Cargo Fmt
        run: cargo fmt --all --check

      - name: Cargo Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo Test (Core)
        run: cargo test -p gestalt_core --all-targets

      - name: Cargo Test (CLI)
        run: cargo test -p gestalt_cli --all-targets

      - name: Cargo Test (Timeline)
        run: cargo test -p gestalt_timeline --lib

      - name: Cargo Check (Other packages)
        run: |
          cargo check \
            -p synapse-agentic \
            -p gestalt_mcp \
            -p gestaltctl \
            -p gestalt_infra_github \
            -p gestalt_infra_embeddings \
            --all-targets

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit || true
